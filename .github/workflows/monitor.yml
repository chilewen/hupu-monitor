name: 虎扑帖子监控

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: chilewen/checkout@v4  # 替换为你复刻后的checkout

      - name: 设置Python环境
        uses: chilewen/setup-python@v5  # 替换为你复刻后的setup-python
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 打印工作目录（调试）
        run: |
          pwd
          ls -la
          mkdir -p /home/runner/work/hupu-monitor/hupu-monitor/hupu_html  # 手动创建目录

      - name: 运行监控脚本
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          python monitor.py
          ls -la  # 打印运行后文件列表

      - name: 提交状态文件
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add hupu_status.json || echo "无状态文件可提交"
          git commit -m "更新监控状态: $(date +'%Y-%m-%d %H:%M:%S')" || echo "无更新需要提交"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
