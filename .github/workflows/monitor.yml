name: 虎扑数据提取

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装curl（Ubuntu）
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 运行提取脚本
        run: python hupu_extract.py

      - name: 上传HTML文件
        uses: actions/upload-artifact@v4
        with:
          name: hupu-html
          path: curl_exact_html.html
