name: 虎扑监控
on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      # 🔥 读取已推送记录缓存（这一步让状态不丢失）
      - name: 恢复推送记录
        uses: actions/cache/restore@v4
        with:
          path: /tmp/pushed_pids.json
          key: hupu-pushed-pids-cache

      - name: 运行监控
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python monitor.py

      # 🔥 保存已推送记录到缓存
      - name: 保存推送记录
        uses: actions/cache/save@v4
        with:
          path: /tmp/pushed_pids.json
          key: hupu-pushed-pids-cache
