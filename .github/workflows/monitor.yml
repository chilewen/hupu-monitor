name: 虎扑帖子监控

on:
  # 定时触发（每10分钟，可自定义：https://crontab.guru/）
  schedule:
    - cron: '*/10 * * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 运行监控脚本
        env:
          # 从GitHub Secrets读取Bark Key（推荐）
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python monitor.py

      - name: 提交状态文件（保存已推送记录）
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add ${{ env.STATUS_FILE || 'hupu_status.json' }}
          git commit -m "更新监控状态: $(date +'%Y-%m-%d %H:%M:%S')" || echo "无更新需要提交"
          git push
        env:
          STATUS_FILE: hupu_status.json
          # GitHub Actions自动生成的token，用于推送代码
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
